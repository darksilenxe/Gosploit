name: auxiliary/network/<module_name>
summary: Describe what this DNS module checks
author: Your Name or Team
references:
  - https://www.cisa.gov/news-events/alerts/2017/01/10/dns-best-practices-network-protection
options:
  - name: host
    description: Target host or domain for DNS inspection
    required: true
    defaultvalue: ""
  - name: port
    description: DNS service port
    required: false
    defaultvalue: "53"
checks:
  - id: recursive_resolution_exposure
    description: Replace with recursive resolver exposure condition
    severity: medium
    indicator: recursion-enabled
