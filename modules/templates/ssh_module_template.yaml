name: auxiliary/linux/<module_name>
summary: Describe what this SSH module checks
author: Your Name or Team
references:
  - https://www.ssh-audit.com/hardening_guides.html
options:
  - name: host
    description: Target Linux host exposing SSH
    required: true
    defaultvalue: ""
  - name: port
    description: SSH service port
    required: false
    defaultvalue: "22"
checks:
  - id: weak_kex_algorithms
    description: Replace with weak key-exchange algorithm condition
    severity: high
    indicator: diffie-hellman-group1-sha1
